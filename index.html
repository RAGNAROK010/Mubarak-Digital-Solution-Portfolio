<head>
    <meta charset="UTF-8">

    <title>Mubarak Digital Solutions | Home</title>
    
    <style>
        /* MODERN GLOBAL RESETS */
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* PREMIUM INTERACTIVE NAV */
        .nav-link {
            display: inline-block;
            color: #a4b3d6;
            text-decoration: none;
            padding: 12px 24px;
            margin: 0 8px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: #ffffff;
            border-color: rgba(0, 102, 255, 0.4);
            background: rgba(0, 102, 255, 0.05);
        }

        .nav-link.active {
            color: #ffffff;
            background: linear-gradient(135deg, #0066ff 0%, #0044cc 100%);
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
        }

        /* HERO ZONE ARCHITECTURE */
        .content-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            gap: 40px;
            flex: 1;
            padding: 20px 0;
        }

        /* LEFT SIDEBAR: GLASSMORPHIC CONTENT CARD */
        .text-section {
            flex: 1; /* Slightly adjusted to give the image more breathing room */
            text-align: left;
            background: rgba(10, 25, 49, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        /* RIGHT SIDEBAR: THE GIANT HERO IMAGE CONTAINER */
        .image-section {
            flex: 2; /* Increased flex from 1.8 to 2 so it takes up much more space on the screen */
            display: flex;
            justify-content: flex-end; /* Aligns the image to the far right edge like the reference */
            align-items: flex-end; /* Snaps the image to the bottom */
            height: 100%;
            position: relative;
        }

        /* Futuristic glow behind your main photo */
        .image-section::before {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.25) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            right: -10%;
            bottom: -10%;
        }

        .showcase-img {
            width: auto;
            max-width: 100%;
            height: auto;
            max-height: 85vh; /* Increased from 70vh to 85vh to make it significantly taller */
            object-fit: contain; /* Ensures the portrait doesn't stretch or distort */
            display: block;
            z-index: 1;
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.6));
            transform: scale(1.1); /* Scales it slightly beyond its bounds to mimic the edge crop of the reference image */
            transform-origin: bottom right; /* Focuses the scale towards the bottom-right corner */
        }

        /* MOBILE-FIRST RESPONSIVE OVERRIDES */
        @media (max-width: 992px) {
            body {
                padding: 20px !important;
            }
            
            .nav-container {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
                margin-bottom: 40px !important;
            }
            
            .nav-link {
                margin: 0 !important;
                padding: 8px 16px !important;
                font-size: 12px !important;
            }

            .content-wrapper {
                flex-direction: column-reverse; /* Put the giant image FIRST on mobile viewing screens */
                text-align: center;
                gap: 40px;
            }

            .text-section {
                text-align: center;
                padding: 30px 20px;
                width: 100%;
            }
            
            .hero-subtitle {
                font-size: 18px !important;
            }
            
            .hero-title {
                font-size: 60px !important;
                margin-bottom: 20px !important;
            }
            
            .showcase-img {
                max-height: 50vh;
                transform: scale(1); /* Reset zoom on mobile to prevent clipping issues */
            }
            
            .footer-container {
                flex-direction: column;
                text-align: center;
                gap: 20px;
                margin-top: 40px !important;
            }
        }
    </style>
</head>
